name: Feature Request
description: Suggest a new feature or improvement for Browser Limit
title: "[Feature]: "
labels: ["enhancement", "status: needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please check existing issues to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What use case does it address?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like. Be as specific as possible.
      placeholder: What should the app do differently?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've considered
      placeholder: "I've tried..."

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of the app would this feature affect?
      options:
        - Detection System
        - Gemini AI Integration
        - Shizuku / Uninstall Flow
        - Overlay / Countdown
        - Audit Log
        - Settings / Configuration
        - Onboarding
        - Security / Parental Lock
        - Documentation
        - Build / CI
        - Other
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Expected Impact
      description: How would this benefit users? Consider usability, privacy, performance, or security.
      placeholder: This would help users who...

  - type: checkboxes
    id: verification
    attributes:
      label: Verification
      options:
        - label: I have searched for existing feature requests before filing this
          required: true
        - label: This feature aligns with the app's goal of digital minimalism
          required: false
