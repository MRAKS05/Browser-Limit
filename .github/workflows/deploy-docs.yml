name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages build
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/pages/webhooks/deploy_hooks/9dc77447-e96f-4009-8cd8-72c5f88d2537"
