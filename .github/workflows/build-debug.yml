name: Build Debug APK (Beta)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Compute version
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "tag=v${VERSION_NAME}-beta.${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          cp app/build/outputs/apk/debug/app-debug.apk "Browser-Limit-v${VERSION}-beta.${TIMESTAMP}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-limit-beta
          path: Browser-Limit-v*.apk
