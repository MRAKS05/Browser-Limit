name: Build Debug APK (Beta)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Target version for this beta (e.g. 1.3.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up debug signing keystore
        run: |
          base64 -d debug.keystore.base64 > debug.keystore
          echo "KEYSTORE_PATH=${GITHUB_WORKSPACE}/debug.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
          echo "KEYSTORE_ALIAS=androiddebugkey" >> $GITHUB_ENV

      - name: Compute version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEXT_VERSION="${{ inputs.version }}"
          if [ -z "$NEXT_VERSION" ]; then
            echo "Error: version input is required" >&2
            exit 1
          fi
          EXISTING=$(gh release list --json tagName --jq '[.[].tagName | select(startswith("v'$NEXT_VERSION'-beta-"))] | length')
          BETA_NUM=$((EXISTING + 1))
          BETA_VERSION="${NEXT_VERSION}-beta-${BETA_NUM}"
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "beta_version=$BETA_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${NEXT_VERSION}-beta-${BETA_NUM}" >> $GITHUB_OUTPUT
          echo "apk_name=Browser-Limit-v${NEXT_VERSION}-beta-${BETA_NUM}.apk" >> $GITHUB_OUTPUT

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug -PbetaVersion=${{ steps.version.outputs.beta_version }}

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk "${{ steps.version.outputs.apk_name }}"

      - name: Compute APK SHA-256
        id: apk-hash
        run: echo "hash=$(sha256sum ${{ steps.version.outputs.apk_name }} | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Create Beta Pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          APK="${{ steps.version.outputs.apk_name }}"
          HASH="${{ steps.apk-hash.outputs.hash }}"

          gh release create "$TAG" \
            --title "v${VERSION} Beta ${TAG##*-}" \
            --prerelease \
            --target "${{ github.sha }}" \
            --notes "**Bug fixes in this beta (preview of v${VERSION}):**\
          \
          - **Critical fix (#30):** ShizukuHelper was missing \`setAccessible(true)\` before invoking the private \`newProcess\` method via reflection. Every uninstall silently failed with \`IllegalAccessException\` caught by the generic catch block. Re-added \`setAccessible(true)\` and restored \`e.printStackTrace()\` for future diagnosability.\
          - **Beta versioning:** The app now shows the beta version (e.g. \`1.3.0-beta-2\`) in \`BuildConfig.VERSION_NAME\` and in the Settings screen.\
          \
          ### What to test\
          \
          - Shizuku uninstall works again (the critical bug) — this is the main fix\
          - The Settings screen shows the correct beta version at the bottom\
          - All previous fixes (#20, #21, #22, #26) from beta-1 are included\
          \
          ### SHA-256\
          \
          \`\`\`\
          $HASH  $APK\
          \`\`\`" \
            "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-limit-beta
          path: Browser-Limit-v*.apk
