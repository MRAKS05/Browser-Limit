name: Build Debug APK (Beta)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Target version for this beta (e.g. 1.3.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up debug signing keystore
        run: |
          base64 -d debug.keystore.base64 > debug.keystore
          echo "KEYSTORE_PATH=${GITHUB_WORKSPACE}/debug.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
          echo "KEYSTORE_ALIAS=androiddebugkey" >> $GITHUB_ENV

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Compute version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEXT_VERSION="${{ inputs.version }}"
          if [ -z "$NEXT_VERSION" ]; then
            echo "Error: version input is required" >&2
            exit 1
          fi
          # Determine next beta number for this version
          EXISTING=$(gh release list --json tagName --jq '[.[].tagName | select(startswith("v'$NEXT_VERSION'-beta-"))] | length')
          BETA_NUM=$((EXISTING + 1))
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${NEXT_VERSION}-beta-${BETA_NUM}" >> $GITHUB_OUTPUT
          echo "apk_name=Browser-Limit-v${NEXT_VERSION}-beta-${BETA_NUM}.apk" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk "${{ steps.version.outputs.apk_name }}"

      - name: Compute APK SHA-256
        id: apk-hash
        run: echo "hash=$(sha256sum ${{ steps.version.outputs.apk_name }} | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Create Beta Pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          APK="${{ steps.version.outputs.apk_name }}"
          HASH="${{ steps.apk-hash.outputs.hash }}"

          gh release create "$TAG" \
            --title "v${VERSION} Beta ${TAG##*-}" \
            --prerelease \
            --target "${{ github.sha }}" \
            --notes "**Bug fixes in this beta (preview of v${VERSION}):**\
          \
          - **#20:** ShizukuHelper no longer leaks InputStream, no longer parses fragile output strings; kept reflection because `Shizuku.newProcess()` is a private system API\
          - **#21:** DashboardScreen no longer runs an infinite polling loop every 2 seconds — status updates are now reactive to binder callbacks\
          - **#22:** Gemini API daily limit is now checked and incremented atomically, preventing race conditions that could exceed the 20/day cap\
          - **#26:** PIN hash comparison uses MessageDigest.isEqual() for constant-time verification, preventing timing side-channel attacks\
          \
          ### What to test\
          \
          - Shizuku package removal still works after the helper rewrite\
          - Dashboard Shizuku status dot updates when Shizuku starts/stops\
          - Gemini daily counter does not exceed 20 even under rapid scans\
          - PIN lock/unlock works correctly (no timing window issues)\
          \
          ### SHA-256\
          \
          \`\`\`\
          $HASH  $APK\
          \`\`\`" \
            "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-limit-beta
          path: Browser-Limit-v*.apk
