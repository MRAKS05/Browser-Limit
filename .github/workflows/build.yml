name: Build APK

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode signing keystore
        run: |
          base64 -d debug.keystore.base64 > debug.keystore
          echo "KEYSTORE_PATH=${GITHUB_WORKSPACE}/debug.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
          echo "KEYSTORE_ALIAS=androiddebugkey" >> $GITHUB_ENV

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk Browser-Limit.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: browser-limit-release
          path: Browser-Limit.apk
